services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    network_mode: host
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - /mnt/Bill's Computer/movies:/data/movies
      - /mnt/Memory Card/tv:/data/tv

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${TZ}
    volumes:
      - jellyseerr_config:/app/config

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    network_mode: host
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - sonarr_config:/config
      - /mnt/Memory Card/tv:/tv
      - /mnt/Memory Card/downloads:/downloads

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    network_mode: host
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - radarr_config:/config
      - /mnt/Bill's Computer/movies:/movies
      - /mnt/Bill's Computer/downloads:/downloads

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: host
    dns: 127.0.0.1
    dns_search: .
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      WEBUI_PORT: "8090"
    volumes:
      - qbittorrent_config:/config
      - /mnt/Bill's Computer/downloads:/downloads/movies
      - /mnt/Memory Card/downloads:/downloads/tv

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    network_mode: host
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - prowlarr_config:/config

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    network_mode: host
    environment:
      LOG_LEVEL: info
      TZ: ${TZ}

  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${TZ}
      DB_HOSTNAME: localhost
      DB_USERNAME: immich
      DB_PASSWORD: ${IMMICH_DB_PASSWORD}
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: localhost
    volumes:
      - /mnt/Bill's Computer/photos:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-machine-learning
    restart: unless-stopped
    network_mode: host
    volumes:
      - immich_ml_cache:/cache

  invidious:
    image: quay.io/invidious/invidious:latest
    container_name: invidious
    restart: unless-stopped
    network_mode: host
    environment:
      # Invidious listens on port 8081 (replacing piped-backend's port)
      INVIDIOUS_CONFIG: |
        db:
          dbname: invidious
          user: kemal
          password: ${INVIDIOUS_PG_PASS}
          host: 127.0.0.1
          port: 5435
        check_tables: true
        hmac_key: ${INVIDIOUS_HMAC_KEY}
        domain: rocketcorner.cooldad.top
        https_only: true
        external_port: 443
        port: 8081
        host_binding: 0.0.0.0
        statistics_enabled: false
        popular_enabled: true
        captcha_enabled: false
        login_enabled: true
        registration_enabled: true
        admins: []
        default_user_preferences:
          dark_mode: "dark"
          quality: dash
          quality_dash: auto
        invidious_companion:
          - private_url: "http://127.0.0.1:8282/companion"
            public_url: "https://rockethideout.cooldad.top/companion"
        invidious_companion_key: ${INVIDIOUS_COMPANION_SECRET}

  invidious-companion:
    image: quay.io/invidious/invidious-companion:latest
    container_name: invidious-companion
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: "8282"
      HOST: "0.0.0.0"
      SERVER_SECRET_KEY: ${INVIDIOUS_COMPANION_SECRET}

volumes:
  jellyfin_config:
    external: true
    name: bkstacker_jellyfin_config
  jellyfin_cache:
    external: true
    name: bkstacker_jellyfin_cache
  jellyseerr_config:
    external: true
    name: bkstacker_jellyseerr_config
  sonarr_config:
    external: true
    name: bkstacker_sonarr_config
  radarr_config:
    external: true
    name: bkstacker_radarr_config
  qbittorrent_config:
    external: true
    name: bkstacker_qbittorrent_config
  prowlarr_config:
    external: true
    name: bkstacker_prowlarr_config
  immich_ml_cache:
    external: true
    name: bkstacker_immich_ml_cache
